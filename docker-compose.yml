version: "3.9"

services:
  go-whikers:
    container_name: whikers
    image: whikers-anime
    build: .
    ports:
      - "8000:8000"
    depends_on:
      whiskers_db:
        condition: service_healthy
      
  whiskers_db:
    container_name: whiskers_db
    image: postgres:14
    environment:
      POSTGRES_PASSWORD: 123
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

      

volumes:
  pgdata: {}