info:
  name: check
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:3001/
  headers:
    - name: Origin
      value: http://localhost:4200
    - name: Cookie
      value: x_access_token={{x_access_token}}; user_id={{user_id}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
